<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zihinsel Odaklanma Testi - Savaş Modu (ULTRA V2)</title>
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    :root {
      --bg-color: #000000;
      --panel-bg: #030303;
      --text-color: #ff003c;
      --border-color: #ff003c;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: "Courier New", Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      user-select: none;
      transition: filter 0.01s ease, transform 0.01s ease, background-color 0.01s ease;
    }
    #main-container {
      background: var(--panel-bg);
      padding: 40px;
      border: 3px solid var(--border-color);
      width: 90%;
      max-width: 700px;
      min-height: 450px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 0 40px rgba(255, 0, 60, 0.3);
      position: relative;
      transition: transform 0.03s ease, filter 0.03s ease;
    }
    .info-panel {
      width: 100%;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 15px;
      font-size: 1.1rem;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      letter-spacing: 1px;
    }
    #display-box {
      font-size: 4.5rem;
      font-weight: bold;
      margin: 30px 0;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      transition: all 0.01s ease;
      text-shadow: 0 0 20px rgba(255, 0, 60, 0.8);
    }
    #input-area {
      margin-top: 10px;
      width: 100%;
      text-align: center;
    }
    input[type="text"] {
      background: #000;
      border: 2px solid var(--border-color);
      color: #00ff66;
      padding: 12px;
      font-size: 2.5rem;
      font-family: monospace;
      border-radius: 0px;
      text-align: center;
      width: 280px;
      outline: none;
      box-shadow: inset 0 0 15px rgba(0, 255, 102, 0.3);
    }
    button {
      background: var(--border-color);
      color: #000000;
      border: none;
      padding: 15px 50px;
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 20px;
      border-radius: 0px;
      transition: all 0.1s ease;
    }
    button:hover {
      background: #00ff66;
      box-shadow: 0 0 20px #00ff66;
    }
    #message-log {
      font-size: 1.2rem;
      font-weight: bold;
      width: 100%;
      text-align: center;
      border-top: 2px solid var(--border-color);
      padding-top: 15px;
      min-height: 35px;
    }
    #timer-bar {
      width: 100%;
      height: 8px;
      background: #ff0000;
      width: 0%;
      transition: width 0.05s linear;
      margin-top: 15px;
    }
    #reset-btn {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: transparent;
      border: 1px dashed #444;
      color: #444;
      padding: 4px 8px;
      font-size: 0.65rem;
      font-weight: bold;
      letter-spacing: 1px;
      margin-top: 0;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    #reset-btn:hover {
      border-color: #ff003c;
      color: #ff003c;
      box-shadow: 0 0 8px rgba(255, 0, 60, 0.4);
      background: rgba(255, 0, 60, 0.05);
    }
    .success { color: #00ff66; text-shadow: 0 0 15px #00ff66; }
    .error { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
  </style>
</head>
<body>

<div id="main-container">
  <div class="info-panel">
    <div>SYS_LVL: <span id="level-val" style="color: #00ff66;">1</span></div>
    <div>BRAIN_MODE: <span id="mode-val" style="color: #00ff66;">-</span></div>
  </div>

  <div id="display-box">WAR_ZONE_V2</div>

  <div id="input-area" style="display: none;">
    <input type="text" id="user-answer" placeholder="INPUT" autocomplete="off">
    <div id="timer-bar"></div>
    <br>
    <button onclick="checkAnswer()">SUBMIT</button>
  </div>

  <button id="action-btn" onclick="startLevel()">ENGAGE</button>

  <div id="message-log"></div>

  <button id="reset-btn" onclick="resetSystem()">RESET SYSTEM</button>
</div>

<script>
  let currentLevel = parseInt(localStorage.getItem('war_mode_level')) ||25;
  let sequence = [];
  let finalAnswer = 0;
  let displayIndex = 0;
  let stepDuration = 1000;

  let audioCtx = null;
  let noiseNode = null;
  let noiseFilter = null;
  let glitchInterval = null;
  let visualChaosInterval = null;
  let bbeatsLeft = null;
  let bbeatsRight = null;

  let answerTimeout = null;
  let timerInterval = null;

  const wordsTR = {3:"ÜÇ", 4:"DÖRT", 5:"BEŞ", 6:"ALTI", 7:"YEDİ", 8:"SEKİZ", 9:"DOKUZ", 10:"ON"};
  const romans = {3:"III", 4:"IV", 5:"V", 6:"VI", 7:"VII", 8:"VIII", 9:"IX", 10:"X"};

  function getLevelConfig(level) {
    let mode = "";
    let count = 6 + Math.floor(level / 1.1);
    let duration = Math.max(120, 1100 - (level * 140)); // Çok daha hızlı akış

    if (level <= 4) {
      mode = "Psiko-Matematiksel Sabotaj (Stroop Renk Tuzağı)";
    } else if (level <= 8) {
      mode = "Kognitif Dezenformasyon (N-Back + Ters İşaret)";
    } else if (level <= 14) {
      mode = "Matris Cebri & İleri Modüler Dinamikler";
    } else if (level <= 19) {
      mode = "Trigonometrik Algı Kırılması";
    } else {
      mode = "Singularity V2 (Sonsuz Küçülme / Kalkülüs Krizleri)";
    }
    return { mode, count, duration };
  }

  function updateUI() {
    let config = getLevelConfig(currentLevel);
    document.getElementById('level-val').innerText = currentLevel;
    document.getElementById('mode-val').innerText = config.mode;

    let actionBtn = document.getElementById('action-btn');
    if(actionBtn && actionBtn.style.display !== 'none') {
      actionBtn.innerText = currentLevel === 1 ? "ENGAGE" : `ENGAGE LEVEL ${currentLevel}`;
    }
  }

  function resetSystem() {
    if(confirm("Tüm simülasyon geçmişi silinecek. Onaylıyor musun?")) {
      localStorage.removeItem('war_mode_level');
      currentLevel = 1;
      updateUI();
      document.getElementById('message-log').className = "error";
      document.getElementById('message-log').innerText = "SYSTEM PURGED.";
      document.getElementById('display-box').innerText = "WAR_ZONE_V2";
      document.getElementById('input-area').style.display = 'none';
      document.getElementById('action-btn').style.display = 'inline-block';
      stopAudioSabotage();
      stopVisualChaos();
    }
  }

  function startAudioSabotage() {
    if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    // Beyni rahatsız eden uyumsuz (dissonant) frekanslar
    let baseFreq = 220;
    let offsetFreq = 47.33;

    bbeatsLeft = audioCtx.createOscillator();
    bbeatsRight = audioCtx.createOscillator();
    let pannerLeft = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
    let pannerRight = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
    let bbeatsGain = audioCtx.createGain();
    bbeatsGain.gain.value = 0.15; // Ses şiddeti artırıldı

    bbeatsLeft.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
    bbeatsRight.frequency.setValueAtTime(baseFreq + offsetFreq, audioCtx.currentTime);

    if(pannerLeft && pannerRight) {
      pannerLeft.pan.setValueAtTime(-1, audioCtx.currentTime);
      pannerRight.pan.setValueAtTime(1, audioCtx.currentTime);
      bbeatsLeft.connect(pannerLeft).connect(bbeatsGain);
      bbeatsRight.connect(pannerRight).connect(bbeatsGain);
    } else {
      bbeatsLeft.connect(bbeatsGain); bbeatsRight.connect(bbeatsGain);
    }
    bbeatsGain.connect(audioCtx.destination);
    bbeatsLeft.start(); bbeatsRight.start();

    noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'notch';
    noiseFilter.frequency.setValueAtTime(800, audioCtx.currentTime);

    let bufferSize = 2 * audioCtx.sampleRate,
            noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate),
            output = noiseBuffer.getChannelData(0);

    let lastOut = 0.0;
    for (let i = 0; i < bufferSize; i++) {
      let white = Math.random() * 2 - 1;
      output[i] = (lastOut + (0.05 * white)) / 1.05;
      lastOut = output[i];
      output[i] *= 6.0;
    }

    noiseNode = audioCtx.createBufferSource();
    noiseNode.buffer = noiseBuffer;
    noiseNode.loop = true;

    let gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.15;

    noiseNode.connect(noiseFilter);
    noiseFilter.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    noiseNode.start();

    glitchInterval = setInterval(() => {
      noiseFilter.frequency.setValueAtTime(Math.random() * 6000 + 50, audioCtx.currentTime);
      if(Math.random() > 0.1) {
        let osc = audioCtx.createOscillator();
        let oscGain = audioCtx.createGain();
        osc.type = Math.random() > 0.5 ? 'sawtooth' : 'square';
        osc.frequency.setValueAtTime(Math.random() * 7000 + 200, audioCtx.currentTime);
        oscGain.gain.setValueAtTime(Math.random() * 0.2 + 0.05, audioCtx.currentTime);
        oscGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
        osc.connect(oscGain);
        oscGain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.12);
      }
    }, 30);
  }

  function stopAudioSabotage() {
    if (noiseNode) { try { noiseNode.stop(); } catch(e){} }
    if (bbeatsLeft) { try { bbeatsLeft.stop(); } catch(e){} }
    if (bbeatsRight) { try { bbeatsRight.stop(); } catch(e){} }
    clearInterval(glitchInterval);
  }

  function startVisualSabotage() {
    visualChaosInterval = setInterval(() => {
      let container = document.getElementById('main-container');

      if(Math.random() > 0.2) {
        // Arka planda agresif renk değişimleri ve flaşör etkisi
        let r = Math.floor(Math.random() * 110);
        let g = Math.floor(Math.random() * 25);
        let b = Math.floor(Math.random() * 25);
        document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        container.style.borderColor = Math.random() > 0.5 ? '#00ff66' : '#ff003c';

        // Şiddetli Ekran Sarsıntısı (Screen Shake)
        let shakeX = Math.random() * 24 - 12;
        let shakeY = Math.random() * 24 - 12;
        let rot = Math.random() * 6 - 3;
        container.style.transform = `translate(${shakeX}px, ${shakeY}px) rotate(${rot}deg)`;
      }

      // Gözü yoran Kör Edici Flashbang Etkisi (Strobe)
      if(Math.random() > 0.85) {
        document.body.style.filter = "invert(1) brightness(3) contrast(3)";
        setTimeout(() => { document.body.style.filter = "none"; }, 40);
      }
    }, 25);
  }

  function stopVisualChaos() {
    clearInterval(visualChaosInterval);
    document.body.style.backgroundColor = "var(--bg-color)";
    let container = document.getElementById('main-container');
    container.style.borderColor = "var(--border-color)";
    container.style.transform = "none";
    document.body.style.filter = "none";
    let box = document.getElementById('display-box');
    box.style.transform = "none";
    box.style.filter = "none";
  }

  function generateSequence() {
    sequence = [];
    let config = getLevelConfig(currentLevel);
    finalAnswer = 0;

    if (currentLevel <= 4) {
      // Stroop Tuzağı: Pozitif sayılar kırmızı (tehlike algısı), negatifler yeşil basılacak!
      for(let i=0; i<config.count; i++) {
        let num = Math.floor(Math.random() * 15) + 3;
        let type = Math.floor(Math.random() * 4);
        let textStr = "";

        if(type === 0) textStr = `+ ${num}`;
        if(type === 1) textStr = `- ${wordsTR[num] || num}`;
        if(type === 2) textStr = `+ ${romans[num] || 'VI'}`;
        if(type === 3) {
          let square = num * num;
          textStr = `+ \\sqrt{${square}}`;
        }

        let calculatedVal = (type === 1) ? -num : num;
        // Stroop renk ataması: Pozitifse sahte renk kırmızı, negatifse yeşil
        let fakeColor = calculatedVal >= 0 ? "#ff003c" : "#00ff66";
        sequence.push({ text: textStr, val: calculatedVal, mathjax: (type === 3), color: fakeColor });
      }
    }
    else if (currentLevel <= 8) {
      // 2-Back Aşırı yükleme ve karmaşık operatörler
      for(let i=0; i<config.count; i++) {
        let num = Math.floor(Math.random() * 25) + 2;
        let sign = Math.random() > 0.5 ? 1 : -1;
        let prefix = sign > 0 ? "+" : "-";
        sequence.push({ text: `${prefix} ${num}`, val: (num * sign), color: Math.random() > 0.5 ? "#00ff66" : "#ff003c" });
      }
    }
    else if (currentLevel <= 14) {
      // Modüler Dinamikler + Çarpma/Bölme Tuzakları
      let initVal = Math.floor(Math.random() * 12) + 6;
      sequence.push({ text: `${initVal}`, val: initVal, type: 'set', color: "#00ff66" });
      for(let i=1; i<config.count; i++) {
        let r = Math.random();
        if(r < 0.33) {
          let m = Math.floor(Math.random() * 4) + 2;
          sequence.push({ text: `\\times ${m}`, mathjax: true, val: m, type: 'mult' });
        } else if(r < 0.66) {
          let mod = Math.random() > 0.5 ? 5 : 9;
          sequence.push({ text: `\\pmod{${mod}}`, mathjax: true, val: mod, type: 'mod' });
        } else {
          let add = Math.floor(Math.random() * 15) - 7;
          sequence.push({ text: add >= 0 ? `+ ${add}` : `- ${Math.abs(add)}`, val: add, type: 'add' });
        }
      }
    }
    else if (currentLevel <= 19) {
      // Matris Determinantı ve Trigonometrik Limit Kırılmaları
      for(let i=0; i<config.count; i++) {
        let type = Math.floor(Math.random() * 3);
        if (type === 0) {
          let a = Math.floor(Math.random() * 6) - 3;
          let b = Math.floor(Math.random() * 4);
          let c = Math.floor(Math.random() * 4) - 1;
          let d = Math.floor(Math.random() * 5) - 2;
          sequence.push({ text: `\\det \\begin{pmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{pmatrix}`, mathjax: true, val: ((a*d) - (b*c)) });
        } else if (type === 1) {
          // cos(pi) = -1 tuzağı veya sin(0) = 0 tuzağı
          let modeTrig = Math.random() > 0.5;
          if(modeTrig) {
            sequence.push({ text: `+ \\frac{d}{dx}(\\sin(x)) \\vert_{x=\\pi}`, mathjax: true, val: -1 }); // cos(pi) = -1
          } else {
            let coef = Math.floor(Math.random() * 4) + 2;
            sequence.push({ text: `- \\frac{d}{dx}(${coef}\\cos(x)) \\vert_{x=0}`, mathjax: true, val: 0 }); // -coef * -sin(0) = 0
          }
        } else {
          let rootValue = Math.floor(Math.random() * 5) + 1;
          sequence.push({ text: `x^2 - ${rootValue * 2}x + ${rootValue * rootValue} = 0 \\rightarrow \\prod x`, mathjax: true, val: (rootValue * rootValue) }); // Kökler çarpımı c/a
        }
      }
    }
    else {
      // İleri Seviye Kalkülüs ve Logaritmik Kaos
      for(let i=0; i<config.count; i++) {
        let calcType = Math.floor(Math.random() * 3);
        let sign = Math.random() > 0.5 ? 1 : -1;
        let signStr = sign > 0 ? "+" : "-";

        if (calcType === 0) {
          let a = Math.floor(Math.random() * 3) + 2;
          sequence.push({ text: `${signStr} \\lim_{x \\to 0} \\frac{\\sin(${a}x)}{x}`, mathjax: true, val: a * sign });
        }
        else if (calcType === 1) {
          let pt = Math.floor(Math.random() * 3) + 1;
          sequence.push({ text: `${signStr} \\frac{d}{dx}(\\ln(x^2)) \\vert_{x=${pt}}`, mathjax: true, val: Math.round((2 / pt) * sign) });
        }
        else {
          let upper = Math.floor(Math.random() * 3) + 1;
          sequence.push({ text: `${signStr} \\int_{0}^{${upper}} (3x^2) \\, dx`, mathjax: true, val: (upper * upper * upper) * sign });
        }
      }
    }

    // Cevap Algoritmalarının Kusursuz Hesaplanması
    if (currentLevel >= 5 && currentLevel <= 8) {
      let nBackCalculated = 0;
      for(let i=2; i<sequence.length; i++) {
        nBackCalculated += sequence[i-2].val;
      }
      finalAnswer = nBackCalculated;
    } else if (currentLevel > 8 && currentLevel <= 14) {
      let currentCalculated = sequence[0].val;
      for(let i=1; i<sequence.length; i++) {
        if(sequence[i].type === 'mult') currentCalculated *= sequence[i].val;
        else if(sequence[i].type === 'mod') currentCalculated = ((currentCalculated % sequence[i].val) + sequence[i].val) % sequence[i].val;
        else if(sequence[i].type === 'add') currentCalculated += sequence[i].val;
      }
      finalAnswer = currentCalculated;
    } else {
      finalAnswer = sequence.reduce((acc, obj) => acc + (obj.val || 0), 0);
    }
  }

  function startLevel() {
    clearTimeout(answerTimeout);
    clearInterval(timerInterval);
    document.getElementById('action-btn').style.display = 'none';
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('user-answer').value = '';
    document.getElementById('message-log').innerText = "";
    document.getElementById('timer-bar').style.width = '0%';

    updateUI();
    generateSequence();

    displayIndex = 0;
    stepDuration = getLevelConfig(currentLevel).duration;

    startAudioSabotage();
    startVisualSabotage();

    showNextElement();
  }

  function showNextElement() {
    let box = document.getElementById('display-box');

    if (displayIndex < sequence.length) {
      let item = sequence[displayIndex];

      // Yazı boyutu ve rotasyonu tamamen istikrarsızlaştırıldı
      box.style.fontSize = `${Math.random() * 2.5 + 2.2}rem`;
      box.style.color = item.color || (Math.random() > 0.5 ? "#ff003c" : "#00ff66");

      // Metin bazlı aşırı sarsıntı ve deformasyon (Glitch efekt taklidi)
      let textSkew = Math.random() * 40 - 20;
      let textScale = Math.random() * 0.6 + 0.7;
      box.style.transform = `rotate(${textSkew}deg) scale(${textScale}) skewX(${Math.random()*20-10}deg)`;
      if(Math.random() > 0.85) box.style.filter = "blur(4px) chromatism";

      if (item.mathjax) {
        box.innerHTML = `$$ ${item.text} $$`;
        MathJax.typesetPromise([box]);
      } else {
        box.innerText = item.text;
      }

      displayIndex++;

      // Jitter (Zaman uyumsuzluğu) tavan yaptırıldı, ritim yakalamak imkansız
      let jitter = (Math.random() * 0.6 - 0.3) * stepDuration;
      let currentStepDuration = Math.max(100, stepDuration + jitter);

      setTimeout(() => {
        box.innerText = "";
        box.style.transform = "none";
        box.style.filter = "none";
        setTimeout(showNextElement, 30); // İki sayı arası geçiş hızı artırıldı
      }, currentStepDuration);

    } else {
      stopAudioSabotage();
      stopVisualChaos();

      box.style.fontSize = "5rem";
      box.style.color = "#00ff66";
      box.innerText = "INPUT_CORE";
      document.getElementById('input-area').style.display = 'block';
      document.getElementById('user-answer').focus();

      startResponseTimer();
    }
  }

  function startResponseTimer() {
    // Yanıt süresi agresif bir şekilde daraltıldı
    let timeLimit = Math.max(1200, 4500 - (currentLevel * 400));
    let elapsed = 0;
    let bar = document.getElementById('timer-bar');

    bar.style.width = '100%';

    timerInterval = setInterval(() => {
      elapsed += 50;
      let percentage = 100 - ((elapsed / timeLimit) * 100);
      bar.style.width = `${percentage}%`;
    }, 50);

    answerTimeout = setTimeout(() => {
      clearInterval(timerInterval);
      let logBox = document.getElementById('message-log');
      logBox.className = "error";
      logBox.innerText = `TIMEOUT! TRUE_ANS: ${finalAnswer}.`;
      resetToNextLoop();
    }, timeLimit);
  }

  function checkAnswer() {
    clearTimeout(answerTimeout);
    clearInterval(timerInterval);

    let userAns = parseFloat(document.getElementById('user-answer').value);
    let logBox = document.getElementById('message-log');

    if (userAns === finalAnswer) {
      logBox.className = "success";
      logBox.innerText = `STAGE ${currentLevel} BREACHED.`;
      currentLevel++;
      localStorage.setItem('war_mode_level', currentLevel);
    } else {
      logBox.className = "error";
      logBox.innerText = `FAIL! TRUE_ANS: ${finalAnswer}.`;
    }

    resetToNextLoop();
  }

  function resetToNextLoop() {
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('action-btn').style.display = 'inline-block';
    updateUI();
  }

  document.getElementById("user-answer").addEventListener("keyup", function(event) {
    if (event.key === "Enter") checkAnswer();
  });

  updateUI();
</script>

</body>
</html>
